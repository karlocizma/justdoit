<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mono / code</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="gap:10px;">
  <div style="font-family:var(--jd-font-mono);font-size:14px;color:var(--jd-fg);">JetBrains Mono · 400 500 600</div>
  <pre style="margin:0;background:var(--jd-code-bg);border:1px solid var(--jd-border-soft);border-radius:6px;padding:10px 12px;font-family:var(--jd-font-mono);font-size:12.5px;color:#48d1cc;line-height:1.5;overflow:auto;">supabase.from('notes').select('*').eq('is_pinned', true)</pre>
  <div style="display:flex;gap:10px;align-items:center;font-size:12px;color:var(--jd-fg-muted);">
    Press <kbd style="background:var(--jd-surface-2);border:1px solid var(--jd-border);border-bottom-width:2px;border-radius:4px;padding:1px 6px;font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-muted);">⌘K</kbd>
    or
    <kbd style="background:var(--jd-surface-2);border:1px solid var(--jd-border);border-bottom-width:2px;border-radius:4px;padding:1px 6px;font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-muted);">Ctrl K</kbd>
    to search.
  </div>
</div></body></html>
