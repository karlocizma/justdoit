<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tag pills</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="row" style="gap:8px;">
  
    <span style="display:inline-flex;align-items:center;gap:6px;background:#48d1cc22;color:#48d1cc;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;line-height:1;">
      <span style="width:6px;height:6px;border-radius:50%;background:#48d1cc;"></span>work
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:#8b7cff22;color:#8b7cff;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;line-height:1;">
      <span style="width:6px;height:6px;border-radius:50%;background:#8b7cff;"></span>personal
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:#e05c5c22;color:#e05c5c;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;line-height:1;">
      <span style="width:6px;height:6px;border-radius:50%;background:#e05c5c;"></span>urgent
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:#f5a62322;color:#f5a623;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;line-height:1;">
      <span style="width:6px;height:6px;border-radius:50%;background:#f5a623;"></span>idea
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:#4caf8922;color:#4caf89;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;line-height:1;">
      <span style="width:6px;height:6px;border-radius:50%;background:#4caf89;"></span>reading
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:#7b82a822;color:#7b82a8;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;line-height:1;">
      <span style="width:6px;height:6px;border-radius:50%;background:#7b82a8;"></span>#untagged
    </span>
  </div>
</div></body></html>
