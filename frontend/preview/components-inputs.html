<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inputs</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--jd-surface);gap:10px;">
  <input placeholder="Search notes and tasks…" style="background:var(--jd-bg);border:1px solid var(--jd-border);border-radius:8px;padding:10px 12px;color:var(--jd-fg);font-family:var(--jd-font-sans);font-size:14px;outline:none;">
  <input placeholder="Focused input" style="background:var(--jd-bg);border:1px solid var(--jd-accent);border-radius:8px;padding:10px 12px;color:var(--jd-fg);font-family:var(--jd-font-sans);font-size:14px;outline:none;box-shadow:0 0 0 3px rgba(108,99,255,0.25);">
  <input value="alice@example.com" disabled style="background:var(--jd-surface-2);border:1px solid var(--jd-border-soft);border-radius:8px;padding:10px 12px;color:var(--jd-fg-dim);font-family:var(--jd-font-sans);font-size:14px;outline:none;">
</div></body></html>
