<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="row" style="gap:14px;">
  
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-surface);border:1px solid var(--jd-border);width:72px;height:60px;border-radius:4px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">4px</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">xs</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-surface);border:1px solid var(--jd-border);width:72px;height:60px;border-radius:6px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">6px</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">sm</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-surface);border:1px solid var(--jd-border);width:72px;height:60px;border-radius:8px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">8px</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">md</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-surface);border:1px solid var(--jd-border);width:72px;height:60px;border-radius:12px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">12px</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">lg</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-surface);border:1px solid var(--jd-border);width:72px;height:60px;border-radius:16px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">16px</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">xl</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-surface);border:1px solid var(--jd-border);width:72px;height:60px;border-radius:20px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">20px</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">2xl</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-surface);border:1px solid var(--jd-border);width:72px;height:24px;border-radius:999px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">999</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">pill</div>
    </div>
  </div>
</div></body></html>
