<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Priority colors</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--jd-surface);">
  <div class="row" style="gap:24px;justify-content:space-around;">
  
    <div class="col" style="align-items:center;gap:8px;">
      <div style="width:16px;height:16px;border-radius:50%;background:#5a6088;box-shadow:0 0 0 3px #5a608825;"></div>
      <div style="font-size:13px;font-weight:600;color:var(--jd-fg);">None</div>
      <div class="hex">#5a6088</div>
    </div>
    <div class="col" style="align-items:center;gap:8px;">
      <div style="width:16px;height:16px;border-radius:50%;background:#48d1cc;box-shadow:0 0 0 3px #48d1cc25;"></div>
      <div style="font-size:13px;font-weight:600;color:var(--jd-fg);">Low</div>
      <div class="hex">#48d1cc</div>
    </div>
    <div class="col" style="align-items:center;gap:8px;">
      <div style="width:16px;height:16px;border-radius:50%;background:#f5a623;box-shadow:0 0 0 3px #f5a62325;"></div>
      <div style="font-size:13px;font-weight:600;color:var(--jd-fg);">Medium</div>
      <div class="hex">#f5a623</div>
    </div>
    <div class="col" style="align-items:center;gap:8px;">
      <div style="width:16px;height:16px;border-radius:50%;background:#e05c5c;box-shadow:0 0 0 3px #e05c5c25;"></div>
      <div style="font-size:13px;font-weight:600;color:var(--jd-fg);">High</div>
      <div class="hex">#e05c5c</div>
    </div>
  </div>
</div></body></html>
