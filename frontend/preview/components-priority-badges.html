<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Priority badges</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--jd-surface);">
  <div class="row" style="gap:10px;">
  
    <span style="display:inline-flex;align-items:center;gap:6px;background:#5a60881f;color:#5a6088;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;">
      <span style="width:6px;height:6px;border-radius:50%;background:#5a6088;"></span>None
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:#48d1cc1f;color:#48d1cc;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;">
      <span style="width:6px;height:6px;border-radius:50%;background:#48d1cc;"></span>Low
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:#f5a6231f;color:#f5a623;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;">
      <span style="width:6px;height:6px;border-radius:50%;background:#f5a623;"></span>Medium
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:#e05c5c1f;color:#e05c5c;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;">
      <span style="width:6px;height:6px;border-radius:50%;background:#e05c5c;"></span>High
    </span>
  </div>
</div></body></html>
