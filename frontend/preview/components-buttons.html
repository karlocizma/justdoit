<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--jd-surface);">
  <div class="row" style="gap:10px;align-items:center;">
    <button style="border:none;border-radius:8px;padding:9px 16px;font-family:var(--jd-font-sans);font-size:14px;font-weight:600;cursor:pointer;line-height:1;background:#6c63ff;color:#fff;">Save</button>
    <button style="border:none;border-radius:8px;padding:9px 16px;font-family:var(--jd-font-sans);font-size:14px;font-weight:600;cursor:pointer;line-height:1;background:#7d75ff;color:#fff;">Save</button>
    <button style="border:none;border-radius:8px;padding:9px 16px;font-family:var(--jd-font-sans);font-size:14px;font-weight:600;cursor:pointer;line-height:1;background:#5a52e8;color:#fff;">Save</button>
    <button style="border:none;border-radius:8px;padding:9px 16px;font-family:var(--jd-font-sans);font-size:14px;font-weight:600;cursor:pointer;line-height:1;background:transparent;color:var(--jd-fg);border:1px solid var(--jd-border);">Cancel</button>
    <button style="border:none;border-radius:8px;padding:9px 16px;font-family:var(--jd-font-sans);font-size:14px;font-weight:600;cursor:pointer;line-height:1;background:transparent;color:var(--jd-fg-muted);">Ghost</button>
    <button style="border:none;border-radius:8px;padding:9px 16px;font-family:var(--jd-font-sans);font-size:14px;font-weight:600;cursor:pointer;line-height:1;background:rgba(224,92,92,0.14);color:#e05c5c;">Delete</button>
  </div>
  <div class="row" style="gap:18px;font-size:11px;color:var(--jd-fg-dim);">
    <span>default</span><span>hover</span><span>press</span><span>outline</span><span>ghost</span><span>danger</span>
  </div>
</div></body></html>
