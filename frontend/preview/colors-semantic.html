<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Semantic</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="row" style="gap:10px;">
  
    <div class="swatch" style="flex:1;">
      <div style="height:56px;border-radius:8px;background:rgba(224,92,92,0.14);border:1px solid #e05c5c40;display:flex;align-items:center;justify-content:center;color:#e05c5c;font-weight:600;font-size:13px;">Danger</div>
      <div class="hex">#e05c5c</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div style="height:56px;border-radius:8px;background:rgba(76,175,137,0.14);border:1px solid #4caf8940;display:flex;align-items:center;justify-content:center;color:#4caf89;font-weight:600;font-size:13px;">Success</div>
      <div class="hex">#4caf89</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div style="height:56px;border-radius:8px;background:rgba(245,166,35,0.14);border:1px solid #f5a62340;display:flex;align-items:center;justify-content:center;color:#f5a623;font-weight:600;font-size:13px;">Warn</div>
      <div class="hex">#f5a623</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div style="height:56px;border-radius:8px;background:rgba(72,209,204,0.14);border:1px solid #48d1cc40;display:flex;align-items:center;justify-content:center;color:#48d1cc;font-weight:600;font-size:13px;">Info</div>
      <div class="hex">#48d1cc</div>
    </div>
  </div>
</div></body></html>
