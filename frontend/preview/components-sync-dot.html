<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Realtime sync dot</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--jd-surface);">
  <div class="row" style="gap:28px;align-items:center;">
    <div class="col" style="gap:6px;">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--jd-fg-muted);">
        <span style="width:8px;height:8px;border-radius:50%;background:#4caf89;box-shadow:0 0 0 3px rgba(76,175,137,0.20);"></span>
        Connected
      </div>
      <div class="hex" style="margin-left:16px;">#4caf89 · solid</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--jd-fg-muted);">
        <span style="width:8px;height:8px;border-radius:50%;background:transparent;border:1.5px solid #7b82a8;"></span>
        Reconnecting
      </div>
      <div class="hex" style="margin-left:16px;">#7b82a8 · outline</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--jd-fg-muted);">
        <span style="width:8px;height:8px;border-radius:50%;background:#f5a623;box-shadow:0 0 0 3px rgba(245,166,35,0.20);"></span>
        Syncing
      </div>
      <div class="hex" style="margin-left:16px;">#f5a623 · pulse</div>
    </div>
  </div>
</div></body></html>
