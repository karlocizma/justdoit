<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body + small + tiny</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="gap:8px;">
  <div style="font-size:15px;line-height:1.55;color:var(--jd-fg);max-width:600px;">
    Body — 15px Inter, line-height 1.55. The default for buttons, fields, sidebar items, and most product copy.
  </div>
  <div style="font-size:15px;line-height:1.7;color:var(--jd-fg);max-width:600px;">
    Note reading body — same 15px but line-height 1.7 for comfortable Markdown reading inside the editor.
  </div>
  <div style="font-size:13px;color:var(--jd-fg-muted);">Small — 13px · secondary copy, metadata, timestamps.</div>
  <div style="font-size:12px;color:var(--jd-fg-dim);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;">Tiny — 12px · labels &amp; badges</div>
</div></body></html>
