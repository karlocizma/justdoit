<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkbox states</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--jd-surface);">
  <div class="row" style="gap:28px;align-items:center;">
    <div class="col" style="align-items:center;gap:8px;">
      <div style="width:22px;height:22px;border-radius:6px;border:1.5px solid var(--jd-fg-dim);"></div>
      <div style="font-size:11px;color:var(--jd-fg-dim);">empty</div>
    </div>
    <div class="col" style="align-items:center;gap:8px;">
      <div style="width:22px;height:22px;border-radius:6px;border:1.5px solid #6c63ff;box-shadow:0 0 0 3px rgba(108,99,255,0.25);"></div>
      <div style="font-size:11px;color:var(--jd-fg-dim);">hover</div>
    </div>
    <div class="col" style="align-items:center;gap:8px;">
      <div style="width:22px;height:22px;border-radius:6px;background:#4caf89;display:flex;align-items:center;justify-content:center;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0f1117" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="font-size:11px;color:var(--jd-fg-dim);">done</div>
    </div>
    <div class="col" style="align-items:center;gap:8px;">
      <div style="width:22px;height:22px;border-radius:6px;background:#4caf8933;border:1.5px solid #4caf89;display:flex;align-items:center;justify-content:center;">
        <div style="width:9px;height:2px;background:#4caf89;border-radius:1px;"></div>
      </div>
      <div style="font-size:11px;color:var(--jd-fg-dim);">partial</div>
    </div>
    <div class="col" style="align-items:center;gap:8px;">
      <div style="width:22px;height:22px;border-radius:6px;border:1.5px solid var(--jd-border-soft);background:var(--jd-surface-2);"></div>
      <div style="font-size:11px;color:var(--jd-fg-dim);">disabled</div>
    </div>
  </div>
</div></body></html>
