<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JustDoIt — Web App</title>
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: var(--jd-bg); overflow: hidden; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--jd-surface-3);
    border-radius: 999px;
    border: 2px solid var(--jd-bg);
  }
  @keyframes jdFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes jdSlideIn {
    from { transform: translateX(20px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Brand.jsx"></script>
<script type="text/babel" src="Popover.jsx"></script>
<script type="text/babel" src="Modals.jsx"></script>
<script type="text/babel" src="NoteCard.jsx"></script>
<script type="text/babel" src="TaskRow.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="NotesView.jsx"></script>
<script type="text/babel" src="NoteEditor.jsx"></script>
<script type="text/babel" src="CollectionViews.jsx"></script>
<script type="text/babel" src="SearchView.jsx"></script>
<script type="text/babel" src="TasksView.jsx"></script>
<script type="text/babel" src="TaskDetailPanel.jsx"></script>
<script type="text/babel" src="SettingsView.jsx"></script>
<script type="text/babel" src="AuthCard.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

<script type="text/babel">
  // Wait for all the Babel-transpiled scripts to attach to window, then mount.
  const mount = () => {
    if (!window.App) { setTimeout(mount, 30); return; }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  };
  mount();
</script>
</body>
</html>
