<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Due date badges</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--jd-surface);">
  <div class="row" style="gap:10px;">
    <span style="background:var(--jd-surface-2);color:var(--jd-fg-muted);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:500;">Jun 12</span>
    <span style="background:rgba(108,99,255,0.14);color:#7d75ff;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;">Today</span>
    <span style="background:rgba(72,209,204,0.14);color:#48d1cc;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;">Tomorrow</span>
    <span style="background:rgba(224,92,92,0.14);color:#e05c5c;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;">Overdue · 2d</span>
    <span style="background:var(--jd-surface-2);color:var(--jd-fg-muted);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:6px;">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Repeats weekly
    </span>
  </div>
</div></body></html>
