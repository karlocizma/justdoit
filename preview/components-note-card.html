<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Note card</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--jd-bg);">
<div style="background:var(--jd-surface);border:1px solid var(--jd-border);border-left:3px solid #8b7cff;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;max-width:340px;">
  <div style="display:flex;align-items:center;gap:6px;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="#7d75ff" stroke="#7d75ff" stroke-width="1.5"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
    <div style="font-size:15px;font-weight:600;color:var(--jd-fg);">Q3 launch retrospective</div>
  </div>
  <div style="font-size:13px;color:var(--jd-fg-muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
    Things that went well — fast iteration on the editor, RLS shipped without incident. Things to fix…
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px;">
    <div style="display:flex;gap:6px;">
      <span style="background:rgba(72,209,204,0.14);color:#48d1cc;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:600;">work</span>
      <span style="background:rgba(245,166,35,0.14);color:#f5a623;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:600;">retro</span>
    </div>
    <span style="font-size:11px;color:var(--jd-fg-dim);">2h ago</span>
  </div>
</div>
</div></body></html>
