<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Note swatches</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="row" style="gap:10px;">
  
    <div class="swatch" style="flex:1;min-width:0;">
      <div style="height:44px;border-radius:10px;background:#47556922;border-left:3px solid #475569;display:flex;align-items:flex-end;padding:6px 8px;color:#475569;font-size:11px;font-weight:600;">Slate</div>
      <div class="hex" style="font-size:10px;">#475569</div>
    </div>
    <div class="swatch" style="flex:1;min-width:0;">
      <div style="height:44px;border-radius:10px;background:#8b7cff22;border-left:3px solid #8b7cff;display:flex;align-items:flex-end;padding:6px 8px;color:#8b7cff;font-size:11px;font-weight:600;">Purple</div>
      <div class="hex" style="font-size:10px;">#8b7cff</div>
    </div>
    <div class="swatch" style="flex:1;min-width:0;">
      <div style="height:44px;border-radius:10px;background:#5b9bff22;border-left:3px solid #5b9bff;display:flex;align-items:flex-end;padding:6px 8px;color:#5b9bff;font-size:11px;font-weight:600;">Blue</div>
      <div class="hex" style="font-size:10px;">#5b9bff</div>
    </div>
    <div class="swatch" style="flex:1;min-width:0;">
      <div style="height:44px;border-radius:10px;background:#48d1cc22;border-left:3px solid #48d1cc;display:flex;align-items:flex-end;padding:6px 8px;color:#48d1cc;font-size:11px;font-weight:600;">Teal</div>
      <div class="hex" style="font-size:10px;">#48d1cc</div>
    </div>
    <div class="swatch" style="flex:1;min-width:0;">
      <div style="height:44px;border-radius:10px;background:#4caf8922;border-left:3px solid #4caf89;display:flex;align-items:flex-end;padding:6px 8px;color:#4caf89;font-size:11px;font-weight:600;">Green</div>
      <div class="hex" style="font-size:10px;">#4caf89</div>
    </div>
    <div class="swatch" style="flex:1;min-width:0;">
      <div style="height:44px;border-radius:10px;background:#f5a62322;border-left:3px solid #f5a623;display:flex;align-items:flex-end;padding:6px 8px;color:#f5a623;font-size:11px;font-weight:600;">Amber</div>
      <div class="hex" style="font-size:10px;">#f5a623</div>
    </div>
    <div class="swatch" style="flex:1;min-width:0;">
      <div style="height:44px;border-radius:10px;background:#e05c8b22;border-left:3px solid #e05c8b;display:flex;align-items:flex-end;padding:6px 8px;color:#e05c8b;font-size:11px;font-weight:600;">Rose</div>
      <div class="hex" style="font-size:10px;">#e05c8b</div>
    </div>
    <div class="swatch" style="flex:1;min-width:0;">
      <div style="height:44px;border-radius:10px;background:#e05c5c22;border-left:3px solid #e05c5c;display:flex;align-items:flex-end;padding:6px 8px;color:#e05c5c;font-size:11px;font-weight:600;">Red</div>
      <div class="hex" style="font-size:10px;">#e05c5c</div>
    </div>
  </div>
</div></body></html>
