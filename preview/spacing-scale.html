<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="row" style="align-items:flex-end;gap:14px;">
  
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-accent);width:4px;height:4px;border-radius:2px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">4</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">1</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-accent);width:8px;height:8px;border-radius:2px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">8</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">2</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-accent);width:12px;height:12px;border-radius:2px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">12</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">3</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-accent);width:16px;height:16px;border-radius:2px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">16</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">4</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-accent);width:20px;height:20px;border-radius:2px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">20</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">5</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-accent);width:24px;height:24px;border-radius:2px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">24</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">6</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-accent);width:32px;height:32px;border-radius:2px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">32</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">8</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-accent);width:40px;height:40px;border-radius:2px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">40</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">10</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="background:var(--jd-accent);width:48px;height:48px;border-radius:2px;"></div>
      <div style="font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg-dim);">48</div>
      <div style="font-size:10px;color:var(--jd-fg-faint);">12</div>
    </div>
  </div>
</div></body></html>
