<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Keyboard</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background:var(--jd-surface);">
  <div class="row" style="gap:14px;align-items:center;font-size:13px;color:var(--jd-fg-muted);">
    Open search <kbd style="background:var(--jd-surface-2);border:1px solid var(--jd-border);border-bottom-width:2px;border-radius:4px;padding:2px 7px;font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg);">⌘K</kbd>
    <span style="color:var(--jd-fg-faint);">·</span>
    New note <kbd style="background:var(--jd-surface-2);border:1px solid var(--jd-border);border-bottom-width:2px;border-radius:4px;padding:2px 7px;font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg);">⌘N</kbd>
    <span style="color:var(--jd-fg-faint);">·</span>
    Complete <kbd style="background:var(--jd-surface-2);border:1px solid var(--jd-border);border-bottom-width:2px;border-radius:4px;padding:2px 7px;font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg);">Space</kbd>
    <span style="color:var(--jd-fg-faint);">·</span>
    Sub-task <kbd style="background:var(--jd-surface-2);border:1px solid var(--jd-border);border-bottom-width:2px;border-radius:4px;padding:2px 7px;font-family:var(--jd-font-mono);font-size:11px;color:var(--jd-fg);">Tab</kbd>
  </div>
</div></body></html>
