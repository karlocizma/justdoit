<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Display + headings</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="gap:10px;">
  <div style="font-size:40px;font-weight:800;letter-spacing:-0.01em;line-height:1.1;">Notes &amp; Tasks, done right.</div>
  <div style="font-size:28px;font-weight:700;letter-spacing:-0.01em;color:var(--jd-fg);">Today</div>
  <div style="font-size:22px;font-weight:600;color:var(--jd-fg);">Pinned notes</div>
  <div style="font-size:18px;font-weight:600;color:var(--jd-fg);">Add reminder</div>
  <div style="display:flex;gap:18px;font-family:var(--jd-font-mono);font-size:10px;color:var(--jd-fg-dim);">
    <span>display 40 / 800</span><span>h1 28 / 700</span><span>h2 22 / 600</span><span>h3 18 / 600</span>
  </div>
</div></body></html>
