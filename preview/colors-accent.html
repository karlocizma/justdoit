<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Accent</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="row" style="gap:14px;">
    <div class="swatch" style="flex:1;">
      <div class="chip" style="background:#6c63ff;height:72px;border:none;display:flex;align-items:flex-end;padding:8px;color:#fff;font-weight:600;font-size:13px;">Primary</div>
      <div class="hex">#6c63ff · --jd-accent</div>
    </div>
    <div class="swatch" style="width:80px;">
      <div class="chip" style="background:#7d75ff;height:72px;border:none;"></div>
      <div class="hex" style="font-size:10px;">hover</div>
    </div>
    <div class="swatch" style="width:80px;">
      <div class="chip" style="background:#5a52e8;height:72px;border:none;"></div>
      <div class="hex" style="font-size:10px;">press</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="chip" style="background:#48d1cc;height:72px;border:none;display:flex;align-items:flex-end;padding:8px;color:#0f1117;font-weight:600;font-size:13px;">Secondary</div>
      <div class="hex">#48d1cc · --jd-accent-2</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="chip" style="background:linear-gradient(135deg,#6c63ff,#48d1cc);height:72px;border:none;display:flex;align-items:flex-end;padding:8px;color:#fff;font-weight:700;font-size:13px;">Brand gradient</div>
      <div class="hex">wordmark only</div>
    </div>
  </div>
</div></body></html>
