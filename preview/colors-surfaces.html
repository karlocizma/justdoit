<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surfaces</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  
<div class="row" style="gap:10px;">

  <div class="swatch" style="flex:1;">
    <div class="chip" style="background:#0f1117;height:56px;"></div>
    <div class="name">Background</div>
    <div class="hex">#0f1117</div>
  </div>
  <div class="swatch" style="flex:1;">
    <div class="chip" style="background:#1a1d27;height:56px;"></div>
    <div class="name">Surface</div>
    <div class="hex">#1a1d27</div>
  </div>
  <div class="swatch" style="flex:1;">
    <div class="chip" style="background:#22263a;height:56px;"></div>
    <div class="name">Surface 2</div>
    <div class="hex">#22263a</div>
  </div>
  <div class="swatch" style="flex:1;">
    <div class="chip" style="background:#2e3350;height:56px;"></div>
    <div class="name">Surface 3</div>
    <div class="hex">#2e3350</div>
  </div>
  <div class="swatch" style="flex:1;">
    <div class="chip" style="background:#12141f;height:56px;"></div>
    <div class="name">Code bg</div>
    <div class="hex">#12141f</div>
  </div>
</div>
</div></body></html>
